services:
  # ── Backend Go ──────────────────────────────────────────────────────────────
  - type: web
    name: divergente-api
    runtime: docker
    dockerfilePath: ./fortress-vault-api/Dockerfile
    dockerContext: ./fortress-vault-api
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: FIREBASE_PROJECT_ID
        value: divergente-4b910
      - key: ALLOWED_ORIGINS
        value: https://divergente-frontend.onrender.com
      - key: AES_KEY
        sync: false   # Set manually in Render dashboard (secret)
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false   # Set manually in Render dashboard (secret)

  # ── Frontend Angular ────────────────────────────────────────────────────────
  - type: web
    name: divergente-frontend
    runtime: static
    buildCommand: npm install --legacy-peer-deps && npm run build -- --configuration=production
    staticPublishPath: ./dist/fortress-vault-frontend/browser
    rootDir: ./fortress-vault-frontend
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
